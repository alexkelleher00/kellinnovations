<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Kells Blog — Kelleher Innovations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    :root {
      --bg:      #0c0c18;
      --bg2:     #111124;
      --surface: #17172a;
      --surface2:#1e1e35;
      --border:  #262640;
      --accent:  #00c8c8;
      --text:    #e6e6f0;
      --muted:   #7878a0;
      --dim:     #50507a;
      --radius:  10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image: linear-gradient(135deg, #0c0c18 0%, #111124 40%, #0b1e2c 70%, #0e1c22 100%);
      background-size: 400% 400%;
      animation: bgShift 30s ease infinite;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Header ── */
    header {
      background: rgba(14, 14, 26, 0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(16px, 5vw, 48px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 60px;
      gap: 16px;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    .site-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
      text-decoration: none;
    }

    .site-brand strong {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .site-brand span {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav { display: flex; gap: 2px; flex-wrap: wrap; }

    nav a {
      padding: 6px 13px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    nav a:hover, nav a.active {
      color: var(--accent);
      background: rgba(0, 200, 200, 0.1);
    }

    /* ── Main ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px clamp(16px, 5vw, 48px) 80px;
    }

    /* ── Page hero ── */
    .blog-hero {
      margin-bottom: 40px;
      padding: 44px 36px;
      border-radius: 16px;
      background: linear-gradient(135deg,
        rgba(0, 200, 200, 0.07),
        rgba(80, 80, 200, 0.05));
      border: 1px solid var(--border);
      text-align: center;
      animation: borderGlow 5s ease-in-out infinite alternate;
    }

    @keyframes borderGlow {
      from { border-color: var(--border); }
      to   { border-color: rgba(0, 200, 200, 0.35); }
    }

    .blog-hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 55%, #8888ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .blog-hero p {
      font-size: 0.95rem;
      color: var(--muted);
    }

    /* ── Compose form ── */
    .compose-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 40px;
    }

    .compose-card h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field.full { grid-column: 1 / -1; }

    .field label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input,
    .field textarea {
      padding: 9px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 200, 200, 0.15);
    }

    .form-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-publish {
      padding: 9px 22px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0, 200, 200, 0.25);
    }

    .btn-publish:hover {
      background: #00e0e0;
      box-shadow: 0 6px 22px rgba(0, 200, 200, 0.4);
    }

    .form-msg {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Admin key ── */
    .admin-row {
      margin-bottom: 32px;
    }

    .admin-row label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dim);
      display: block;
      margin-bottom: 5px;
    }

    .admin-row input {
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: inherit;
      width: 260px;
      max-width: 100%;
      transition: border-color 0.2s;
    }

    .admin-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ── Posts ── */
    .posts-section h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .posts-section h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    .post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .post:hover {
      border-color: rgba(0, 200, 200, 0.25);
    }

    .post h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }

    .post .meta {
      font-size: 0.78rem;
      color: var(--dim);
      margin-bottom: 12px;
    }

    .post .body {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.65;
    }

    .btn-delete {
      background: rgba(180, 40, 40, 0.15);
      color: #e06060;
      border: 1px solid rgba(180, 40, 40, 0.25);
      padding: 4px 10px;
      border-radius: 5px;
      border: 0;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .btn-delete:hover { background: rgba(180, 40, 40, 0.3); }

    /* ── Footer ── */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 22px clamp(16px, 5vw, 48px);
      text-align: center;
      color: var(--dim);
      font-size: 0.82rem;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .compose-card { padding: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="site-brand">
      <strong>Kelleher Innovations</strong>
      <span>Building Intelligent Systems</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="woodwork.html">Woodwork</a>
      <a href="psg.html">Punk Squad Games</a>
      <a href="blog.html" class="active">Blog</a>
    </nav>
  </div>
</header>

<main>

  <div class="blog-hero">
    <h1>The Kells Blog</h1>
    <p>Share a title, your message, and sign your name. Maybe talk about The Wire.</p>
  </div>

  <div class="compose-card">
    <h2>New Post</h2>
    <form id="postForm">
      <div class="form-grid">
        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title" maxlength="200" required placeholder="What's on your mind?" />
        </div>
        <div class="field">
          <label for="name">Your Name</label>
          <input type="text" id="name" maxlength="100" placeholder="Optional — defaults to Anonymous" />
        </div>
        <div class="field full">
          <label for="content">Message</label>
          <textarea id="content" rows="5" maxlength="5000" required placeholder="Write something…"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-publish">Publish</button>
        <div id="formMsg" class="form-msg"></div>
      </div>
    </form>
  </div>

  <div class="admin-row">
    <label for="adminKey">Admin Key (optional — enables post deletion)</label>
    <input type="password" id="adminKey" placeholder="Enter admin key" />
  </div>

  <section class="posts-section">
    <h2>Recent Posts</h2>
    <div id="postsList">Loading...</div>
  </section>

</main>

<footer>
  <p>&copy; 2026 Kelleher Innovations</p>
</footer>

<script>
const API_BASE  = "https://api.kellinnovations.com/blog";
const API_POSTS = API_BASE + "/api/posts";

const postsList  = document.getElementById("postsList");
const form       = document.getElementById("postForm");
const formMsg    = document.getElementById("formMsg");
const adminInput = document.getElementById("adminKey");

function escapeHtml(unsafe) {
  return unsafe
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadPosts() {
  try {
    const res = await fetch(API_POSTS);
    if (!res.ok) throw new Error("Network error");
    const posts = await res.json();
    renderPosts(posts);
  } catch (e) {
    postsList.innerHTML = "<p style='color:#e06060'>Unable to load posts.</p>";
  }
}

function renderPosts(posts) {
  const adminKey = adminInput.value.trim();
  if (!posts || posts.length === 0) {
    postsList.innerHTML = "<p style='color:var(--dim);font-style:italic'>No posts yet — be the first!</p>";
    return;
  }
  postsList.innerHTML = posts.map(p => {
    const title   = escapeHtml(p.title);
    const content = escapeHtml(p.content).replaceAll("\n", "<br>");
    const name    = escapeHtml(p.name || "Anonymous");
    const created = new Date(p.created_at).toLocaleString();
    const deleteBtn = adminKey
      ? `<button class="btn-delete" onclick="deletePost(${p.id})">Delete</button>`
      : "";
    return `
      <article class="post">
        <h3>${title}</h3>
        <div class="meta">by ${name} &middot; ${created}</div>
        <div class="body">${content}</div>
        ${deleteBtn}
      </article>`;
  }).join("");
}

form.addEventListener("submit", async ev => {
  ev.preventDefault();
  formMsg.textContent = "";
  const title   = document.getElementById("title").value.trim();
  const name    = document.getElementById("name").value.trim() || "Anonymous";
  const content = document.getElementById("content").value.trim();

  if (!title || !content) {
    formMsg.textContent = "Please add a title and message.";
    return;
  }

  try {
    const res = await fetch(API_POSTS, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, name, content })
    });

    if (res.status === 429) { formMsg.textContent = "Posting too frequently — try again later."; return; }

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "Post failed" }));
      formMsg.textContent = err.error || "Failed to post.";
      return;
    }

    form.reset();
    formMsg.textContent = "Posted!";
    loadPosts();
  } catch {
    formMsg.textContent = "Network error while posting.";
  }
});

async function deletePost(postId) {
  const adminKey = adminInput.value.trim();
  if (!adminKey) { alert("Admin key required to delete posts"); return; }
  if (!confirm("Delete this post?")) return;

  try {
    const res = await fetch(`${API_POSTS}/${postId}`, {
      method: "DELETE",
      headers: { "X-Admin-Key": adminKey }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "Delete failed" }));
      alert(err.error || "Failed to delete post");
      return;
    }
    loadPosts();
  } catch {
    alert("Network error while deleting.");
  }
}

adminInput.addEventListener("input", loadPosts);
loadPosts();
</script>

</body>
</html>
